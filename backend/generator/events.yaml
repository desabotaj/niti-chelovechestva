# Threads of Humanity — historical event catalog (74 events).
# ────────────────────────────────────────────────────────────────────────
# Each entry drives the population/migration simulator. Numbers are
# *artistic-but-plausible* not literal historiography. Region IDs match
# `geography.REGIONS`. Time-windows are inclusive on the start year and
# exclusive on the end year.
#
# Schema
#   id            short slug
#   name          human-readable label (used in the UI ticker)
#   start, end    years
#   type          war | plague | famine | revolution | colonization |
#                 industrialization | persecution | goldrush |
#                 partition | natural | exploration | abolition | exodus
#   mortality     excess-mortality multiplier in affected regions
#                 (1.0 = baseline, 3.0 = 3× normal deaths)
#   birth         birth-rate multiplier (0.6 = depressed)
#   regions       [region_id, ...]   — where mortality / birth shocks land
#   pulls         migration draws — list of
#                   { from: <region>, to: <region>, weight: 0..1, reason: text }
#                 weight ≈ probability mass for an emigrant in `from`
#                 to choose `to` during the event window
# ────────────────────────────────────────────────────────────────────────

